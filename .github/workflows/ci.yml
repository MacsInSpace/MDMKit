name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  jamfprokit:
    name: JamfProKit (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: pwsh
        working-directory: JamfProKit
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          Install-Module Pester -MinimumVersion 5.5 -Force -Scope CurrentUser
          Install-Module PSScriptAnalyzer -MinimumVersion 1.22 -Force -Scope CurrentUser

      - name: PSScriptAnalyzer
        run: ./build.ps1 -Analyze

      - name: Pester
        run: ./build.ps1 -Test

      - name: Package
        run: ./build.ps1 -Package
