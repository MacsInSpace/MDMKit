name: Publish to PowerShell Gallery

# Publishes JamfProKit when a release tag (jamfprokit-v*) is pushed.
# Tag scheme leaves room for jamfschoolkit-v* later.
# Requires the repository secret PSGALLERY_API_KEY.

on:
  push:
    tags: ['jamfprokit-v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
        working-directory: JamfProKit
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          Install-Module Pester -MinimumVersion 5.5 -Force -Scope CurrentUser
          Install-Module PSScriptAnalyzer -MinimumVersion 1.22 -Force -Scope CurrentUser

      - name: Build and test
        run: ./build.ps1

      - name: Publish
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          Publish-PSResource -Path ./dist/JamfProKit -Repository PSGallery -ApiKey $env:PSGALLERY_API_KEY
